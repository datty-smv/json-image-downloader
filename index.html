<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Image Downloader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap');

  :root {
    --bg: #0e0e12;
    --surface: #18181f;
    --surface2: #22222d;
    --border: #2a2a38;
    --text: #e4e4ef;
    --text-dim: #8888a0;
    --accent: #6ee7b7;
    --accent-dim: #2d6b55;
    --danger: #f87171;
    --info: #60a5fa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', 'JetBrains Mono', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
    color: var(--accent);
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 2rem;
  }

  /* Drop Zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: var(--surface);
    position: relative;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--surface2);
  }
  .drop-zone.dragover {
    box-shadow: 0 0 30px rgba(110, 231, 183, 0.1);
  }
  .drop-zone-icon {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
  }
  .drop-zone-text {
    font-size: 0.95rem;
    color: var(--text-dim);
  }
  .drop-zone-text strong { color: var(--accent); }
  .drop-zone input { display: none; }

  /* Config */
  .config-panel {
    display: none;
    margin-top: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
  }
  .config-panel.visible { display: block; }

  .config-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .config-row label {
    font-size: 0.8rem;
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .config-row input[type="text"] {
    flex: 1;
    min-width: 200px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.85rem;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border 0.2s;
  }
  .config-row input[type="text"]:focus {
    border-color: var(--accent);
  }

  .config-row input[type="text"]::placeholder {
    color: var(--text-dim);
    opacity: 0.6;
  }

  .key-path-hint {
    width: 100%;
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 0.35rem;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Stats */
  .stats-bar {
    display: none;
    margin-top: 1.25rem;
    padding: 0.85rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    color: var(--text-dim);
    gap: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
  }
  .stats-bar.visible { display: flex; }
  .stats-bar .stat-val { color: var(--accent); font-weight: 700; }

  /* Buttons */
  .actions {
    display: none;
    margin-top: 1.25rem;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .actions.visible { display: flex; }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 0.65rem 1.4rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }
  .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent-dim); }

  /* Progress */
  .progress-area {
    display: none;
    margin-top: 1.25rem;
  }
  .progress-area.visible { display: block; }
  .progress-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.15s;
  }
  .progress-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-top: 0.4rem;
  }

  /* Grid */
  .grid-area {
    display: none;
    margin-top: 1.75rem;
  }
  .grid-area.visible { display: block; }

  .grid-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .grid-header h2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    font-weight: 600;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 0.75rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
  }
  .card:hover {
    border-color: var(--accent-dim);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  .card.selected { border-color: var(--accent); }
  .card.selected::after {
    content: '✓';
    position: absolute;
    top: 6px; right: 6px;
    width: 22px; height: 22px;
    background: var(--accent);
    color: var(--bg);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
  }
  .card.error { border-color: var(--danger); opacity: 0.5; }

  .card-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: contain;
    background: var(--surface2);
    display: block;
  }
  .card-img-placeholder {
    width: 100%;
    aspect-ratio: 1;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 0.7rem;
  }

  .card-info {
    padding: 0.5rem 0.6rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Log */
  .log-area {
    display: none;
    margin-top: 1.5rem;
  }
  .log-area.visible { display: block; }
  .log-area summary {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-dim);
    cursor: pointer;
    margin-bottom: 0.5rem;
  }
  .log-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    max-height: 200px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    line-height: 1.7;
  }
  .log-box .err { color: var(--danger); }
  .log-box .ok { color: var(--accent); }

  /* Select All */
  .select-toggle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--info);
    cursor: pointer;
    background: none;
    border: none;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .select-toggle:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <h1>⬇ JSON Image Downloader</h1>
  <p class="subtitle">JSONファイルから画像URLを抽出し、プレビュー＆一括ダウンロード</p>

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-icon">📂</div>
    <div class="drop-zone-text"><strong>JSONファイルをドロップ</strong>するか、クリックして選択</div>
    <input type="file" id="fileInput" accept=".json">
  </div>

  <!-- Config -->
  <div class="config-panel" id="configPanel">
    <div class="config-row">
      <label>画像キー</label>
      <input type="text" id="keyPath" value="avatarPath" placeholder="avatarPath">
      <label>ベースURL</label>
      <input type="text" id="baseUrl" placeholder="https://example.com/" value="">
    </div>
    <div class="key-path-hint">
      キーを変更するとJSON内の別プロパティを参照できます。ネスト対応: <code>front.avatarPath</code>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar">
    <span>検出: <span class="stat-val" id="statTotal">0</span> 件</span>
    <span>選択中: <span class="stat-val" id="statSelected">0</span> 件</span>
    <span>エラー: <span class="stat-val" id="statErrors" style="color:var(--danger)">0</span> 件</span>
  </div>

  <!-- Actions -->
  <div class="actions" id="actionsBar">
    <button class="btn btn-primary" id="btnDownload">選択画像をダウンロード</button>
    <button class="btn btn-secondary" id="btnReload">再読み込み</button>
  </div>

  <!-- Progress -->
  <div class="progress-area" id="progressArea">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">0 / 0</div>
  </div>

  <!-- Grid -->
  <div class="grid-area" id="gridArea">
    <div class="grid-header">
      <h2>プレビュー</h2>
      <button class="select-toggle" id="btnSelectAll">すべて選択</button>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- Log -->
  <div class="log-area" id="logArea">
    <details>
      <summary>ログを表示</summary>
      <div class="log-box" id="logBox"></div>
    </details>
  </div>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);

  const dropZone = $('dropZone');
  const fileInput = $('fileInput');
  const configPanel = $('configPanel');
  const keyPathInput = $('keyPath');
  const baseUrlInput = $('baseUrl');
  const statsBar = $('statsBar');
  const actionsBar = $('actionsBar');
  const progressArea = $('progressArea');
  const progressFill = $('progressFill');
  const progressText = $('progressText');
  const gridArea = $('gridArea');
  const grid = $('grid');
  const logArea = $('logArea');
  const logBox = $('logBox');
  const btnDownload = $('btnDownload');
  const btnReload = $('btnReload');
  const btnSelectAll = $('btnSelectAll');

  let jsonData = null;
  let items = [];         // { path, selected, el, error }
  let allSelected = true;

  // --- Drag & Drop ---
  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f && f.name.endsWith('.json')) loadFile(f);
  });

  // --- Load JSON ---
  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        jsonData = JSON.parse(e.target.result);
        configPanel.classList.add('visible');
        log(`JSON読み込み完了: ${file.name}`, 'ok');
        extractAndRender();
      } catch (err) {
        log(`JSONパースエラー: ${err.message}`, 'err');
      }
    };
    reader.readAsText(file);
  }

  // --- Key Path Input ---
  let debounce;
  keyPathInput.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => { if (jsonData) extractAndRender(); }, 400);
  });
  baseUrlInput.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => { if (jsonData) extractAndRender(); }, 400);
  });

  // --- Extract image paths ---
  function getNestedValue(obj, path) {
    return path.split('.').reduce((o, k) => (o && o[k] !== undefined) ? o[k] : undefined, obj);
  }

  function extractPaths(data, keyName) {
    const paths = [];
    function walk(node) {
      if (Array.isArray(node)) {
        node.forEach(walk);
      } else if (node && typeof node === 'object') {
        // Check if this node directly has the target key
        if (typeof node[keyName] === 'string' && node[keyName].length > 0) {
          paths.push(node[keyName]);
        }
        // Also support dot-notation (e.g. "front.avatarPath")
        if (keyName.includes('.')) {
          const val = getNestedValue(node, keyName);
          if (typeof val === 'string' && val.length > 0) {
            paths.push(val);
          }
        }
        // Recurse into all child objects/arrays
        Object.entries(node).forEach(([k, v]) => {
          // Skip the key we just matched to avoid double-counting
          if (k === keyName) return;
          if (typeof v === 'object' && v !== null) walk(v);
        });
      }
    }
    walk(data);
    // dedupe while preserving order
    return [...new Set(paths)];
  }

  function extractAndRender() {
    const keyPath = keyPathInput.value.trim() || 'avatarPath';
    const paths = extractPaths(jsonData, keyPath);

    items = paths.map(p => ({ path: p, selected: true, el: null, error: false }));
    allSelected = true;
    btnSelectAll.textContent = 'すべて解除';

    log(`キー "${keyPath}" から ${paths.length} 件の画像パスを検出`, 'ok');

    renderGrid();
    updateStats();
    statsBar.classList.add('visible');
    actionsBar.classList.add('visible');
    gridArea.classList.add('visible');
    logArea.classList.add('visible');
  }

  // --- Render Grid ---
  function renderGrid() {
    grid.innerHTML = '';
    const base = baseUrlInput.value.trim();

    items.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'card selected';
      item.el = card;

      const fullUrl = base ? new URL(item.path, base).href : item.path;

      const img = document.createElement('img');
      img.className = 'card-img';
      img.loading = 'lazy';
      img.src = fullUrl;
      img.alt = item.path;
      img.onerror = () => {
        item.error = true;
        card.classList.add('error');
        img.replaceWith(createPlaceholder('読込失敗'));
        updateStats();
      };
      card.appendChild(img);

      const info = document.createElement('div');
      info.className = 'card-info';
      info.textContent = item.path.split('/').pop();
      info.title = item.path;
      card.appendChild(info);

      card.addEventListener('click', () => {
        item.selected = !item.selected;
        card.classList.toggle('selected', item.selected);
        updateStats();
      });

      grid.appendChild(card);
    });
  }

  function createPlaceholder(text) {
    const div = document.createElement('div');
    div.className = 'card-img-placeholder';
    div.textContent = text;
    return div;
  }

  // --- Stats ---
  function updateStats() {
    $('statTotal').textContent = items.length;
    $('statSelected').textContent = items.filter(i => i.selected).length;
    $('statErrors').textContent = items.filter(i => i.error).length;
    btnDownload.disabled = items.filter(i => i.selected && !i.error).length === 0;
  }

  // --- Select All ---
  btnSelectAll.addEventListener('click', () => {
    allSelected = !allSelected;
    items.forEach(item => {
      item.selected = allSelected;
      item.el.classList.toggle('selected', allSelected);
    });
    btnSelectAll.textContent = allSelected ? 'すべて解除' : 'すべて選択';
    updateStats();
  });

  // --- Download via canvas (CORS-free) ---
  function downloadViaCanvas(imgSrc, filename) {
    return new Promise((resolve) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        try {
          const canvas = document.createElement('canvas');
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          canvas.toBlob(blob => {
            if (blob) {
              const a = document.createElement('a');
              a.href = URL.createObjectURL(blob);
              a.download = filename;
              a.click();
              URL.revokeObjectURL(a.href);
              log(`✓ ${filename}`, 'ok');
            } else {
              log(`✗ ${filename}: blob生成失敗`, 'err');
            }
            resolve();
          }, 'image/png');
        } catch (e) {
          // canvas tainted — fallback to open in new tab
          log(`⚠ ${filename}: canvas汚染 → 新タブで開きます`, 'err');
          window.open(imgSrc, '_blank');
          resolve();
        }
      };
      img.onerror = () => {
        // Fallback: direct link open
        log(`⚠ ${filename}: 読込失敗 → 新タブで開きます`, 'err');
        window.open(imgSrc, '_blank');
        resolve();
      };
      img.src = imgSrc;
    });
  }

  btnDownload.addEventListener('click', async () => {
    const selected = items.filter(i => i.selected && !i.error);
    if (!selected.length) return;

    const base = baseUrlInput.value.trim();
    btnDownload.disabled = true;
    progressArea.classList.add('visible');

    let done = 0;
    const total = selected.length;

    for (const item of selected) {
      const fullUrl = base ? new URL(item.path, base).href : item.path;
      const filename = item.path.split('/').pop();
      await downloadViaCanvas(fullUrl, filename);
      done++;
      progressFill.style.width = `${(done / total) * 100}%`;
      progressText.textContent = `${done} / ${total}`;
      // small delay to avoid browser blocking rapid downloads
      await new Promise(r => setTimeout(r, 200));
    }

    btnDownload.disabled = false;
    log(`ダウンロード完了: ${done}/${total}`, 'ok');
  });

  // --- Reload ---
  btnReload.addEventListener('click', () => {
    if (jsonData) extractAndRender();
  });

  // --- Log ---
  function log(msg, type = '') {
    const line = document.createElement('div');
    if (type) line.className = type;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logBox.appendChild(line);
    logBox.scrollTop = logBox.scrollHeight;
  }
})();
</script>
</body>
</html>
